name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Set these under Settings → Secrets and variables → Actions → Variables
      # in this repository. Nothing live/production is hardcoded in this file —
      # that was the exact problem being fixed here.
      VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      VITE_DASHBOARD_URL: ${{ vars.VITE_DASHBOARD_URL }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
